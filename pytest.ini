[pytest]
# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = .

# Minimum version
minversion = 7.0

# Add options
addopts = 
    --strict-markers
    --tb=short
    --maxfail=5
    --capture=no
    -v

# Test markers (актуальный перечень)
markers =
    api: API tests
    ui: User interface tests
    auth: Authentication related tests
    accounts: Account management tests
    transfers: Money transfer tests
    integration: Integration tests between components
    performance: Performance checks
    concurrency: Concurrency and parallel execution tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings (не скрываем DeprecationWarning для прозрачности)
filterwarnings =
    ignore:.*:pytest.PytestConfigWarning 